name: OS Compatibility Fixtures

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lcp-usage-ledger-fixtures:
    name: LCP usage ledger fixtures (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run release-readiness gate
        run: npm run audit:foundation
